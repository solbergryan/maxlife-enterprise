<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Seller Net Sheet | Brevard County, FL</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<link href="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.css" rel="stylesheet">
<style>
  .focus-within-ring:focus-within { box-shadow: 0 0 0 2px rgba(96,165,250,0.5); }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useMemo, useCallback } = React;

// ─── FL Rate Tables ───
const FL_DOC_STAMP_DEED = 0.70;
const FL_TITLE_BASE = 5.75;
const FL_TITLE_EXCESS = 5.00;

function calcOwnerTitle(price) {
  if (price <= 0) return 0;
  if (price <= 100000) return price / 1000 * FL_TITLE_BASE;
  return 100 * FL_TITLE_BASE + (price - 100000) / 1000 * FL_TITLE_EXCESS;
}
function calcSearchFee(price) { return Math.round(calcOwnerTitle(price) * 0.25 * 100) / 100; }
const fmt = (n) => n.toLocaleString("en-US", { style: "currency", currency: "USD", minimumFractionDigits: 2 });

const SELLER_CC = { titleFees: { closingFee: 450, lienSearch: 125, estoppelFee: 350 }, otherFees: { recordingFee: 18.50 } };
const LOAN_TYPES = [
  { value: "conventional", label: "Conventional" }, { value: "fha", label: "FHA" },
  { value: "va", label: "VA" }, { value: "allCash", label: "All Cash" },
  { value: "usda", label: "USDA" }, { value: "conv2nd", label: "Conv 2nd" },
  { value: "ownerFinance", label: "Owner Finance" },
];
const PAID_BY = [{ value: "seller", label: "Seller" }, { value: "buyer", label: "Buyer" }, { value: "split", label: "Split" }];

function CurrencyInput({ label, value, onChange, placeholder }) {
  return (
    <div className="mb-4">
      <label className="block text-sm font-medium text-gray-600 mb-1">{label}</label>
      <div className="flex items-center border border-gray-300 rounded-lg overflow-hidden focus-within-ring">
        <span className="px-3 py-2 bg-blue-50 text-blue-600 font-semibold text-sm border-r border-gray-300">$</span>
        <input type="text" className="flex-1 px-3 py-2 outline-none text-gray-800" placeholder={placeholder || "0"}
          value={value === 0 ? "" : value.toLocaleString()}
          onChange={(e) => { const r = e.target.value.replace(/[^0-9.]/g, ""); onChange(r === "" ? 0 : parseFloat(r)); }} />
      </div>
    </div>
  );
}

function PctOrDollarInput({ label, value, isPct, onValueChange, onModeChange }) {
  return (
    <div className="mb-4">
      <label className="block text-sm font-medium text-gray-600 mb-1">{label}</label>
      <div className="flex items-center border border-gray-300 rounded-lg overflow-hidden focus-within-ring">
        <button onClick={() => onModeChange(true)} className={`px-3 py-2 text-sm font-semibold border-r border-gray-300 ${isPct ? "bg-blue-50 text-blue-600" : "bg-gray-50 text-gray-400"}`}>%</button>
        <button onClick={() => onModeChange(false)} className={`px-3 py-2 text-sm font-semibold border-r border-gray-300 ${!isPct ? "bg-blue-50 text-blue-600" : "bg-gray-50 text-gray-400"}`}>$</button>
        <input type="text" className="flex-1 px-3 py-2 outline-none text-gray-800" value={value === 0 ? "" : value}
          onChange={(e) => { const r = e.target.value.replace(/[^0-9.]/g, ""); onValueChange(r === "" ? 0 : parseFloat(r)); }} />
      </div>
    </div>
  );
}

function generatePDF(salesPrice, loanType, calc, inputs) {
  const W = 612, H = 792;
  const canvas = document.createElement("canvas");
  canvas.width = W * 2; canvas.height = H * 2;
  const ctx = canvas.getContext("2d");
  ctx.scale(2, 2); ctx.fillStyle = "#fff"; ctx.fillRect(0, 0, W, H);
  let y = 0; const LM = 50, COL_R = W - 50;
  ctx.fillStyle = "#1a7a3a"; ctx.fillRect(0, 0, W, 60);
  ctx.fillStyle = "#fff"; ctx.font = "bold 22px Helvetica, Arial, sans-serif"; ctx.fillText("Seller Net Sheet", LM, 40);
  ctx.font = "12px Helvetica, Arial, sans-serif"; ctx.fillStyle = "#d4f5dd"; ctx.textAlign = "right"; ctx.fillText("Brevard County, FL", COL_R, 40); ctx.textAlign = "left"; y = 80;
  ctx.fillStyle = "#666"; ctx.font = "10px Helvetica, Arial, sans-serif"; ctx.fillText("Date: " + new Date().toLocaleDateString(), LM, y);
  ctx.textAlign = "right"; ctx.fillText("Loan Type: " + (LOAN_TYPES.find(l => l.value === loanType)?.label || loanType), COL_R, y); ctx.textAlign = "left"; y += 25;
  ctx.fillStyle = "#f0fdf4"; ctx.fillRect(LM-10, y-5, COL_R-LM+20, 55); ctx.strokeStyle = "#22c55e"; ctx.lineWidth = 1; ctx.strokeRect(LM-10, y-5, COL_R-LM+20, 55);
  ctx.fillStyle = "#15803d"; ctx.font = "bold 14px Helvetica, Arial, sans-serif"; ctx.fillText("NET AT CLOSE", LM, y+18);
  ctx.font = "bold 28px Helvetica, Arial, sans-serif"; ctx.fillStyle = calc.netAtClose >= 0 ? "#15803d" : "#dc2626"; ctx.textAlign = "right"; ctx.fillText(fmt(calc.netAtClose), COL_R, y+40); ctx.textAlign = "left"; y += 75;
  function sRow(l, v, b, c) { ctx.fillStyle = c||"#333"; ctx.font = (b?"bold ":"")+"12px Helvetica, Arial, sans-serif"; ctx.fillText(l, LM, y); ctx.textAlign = "right"; ctx.fillText(fmt(v), COL_R, y); ctx.textAlign = "left"; y += 20; }
  ctx.fillStyle = "#333"; ctx.font = "bold 13px Helvetica, Arial, sans-serif"; ctx.fillText("SUMMARY", LM, y); y += 18;
  ctx.strokeStyle = "#ddd"; ctx.lineWidth = 0.5; ctx.beginPath(); ctx.moveTo(LM, y-5); ctx.lineTo(COL_R, y-5); ctx.stroke();
  sRow("Sales Price", salesPrice, true, "#111"); sRow("Mortgage Payoff", -calc.loanBalance, false, calc.loanBalance > 0 ? "#dc2626" : "#666");
  sRow("Property Tax Debit", -calc.proratedTaxDebit, false, "#dc2626"); sRow("Total Closing Costs", -calc.totalClosingCosts, false, "#dc2626");
  ctx.beginPath(); ctx.moveTo(LM, y-3); ctx.lineTo(COL_R, y-3); ctx.stroke(); sRow("Net at Close", calc.netAtClose, true, calc.netAtClose >= 0 ? "#15803d" : "#dc2626"); y += 10;
  function secH(t) { ctx.fillStyle = "#f8fafc"; ctx.fillRect(LM-5, y-3, COL_R-LM+10, 20); ctx.fillStyle = "#1e40af"; ctx.font = "bold 11px Helvetica, Arial, sans-serif"; ctx.fillText(t, LM, y+12); y += 25; }
  function row(l, v, ind) { ctx.fillStyle = "#555"; ctx.font = "11px Helvetica, Arial, sans-serif"; ctx.fillText(l, LM+(ind||0), y); ctx.textAlign = "right"; ctx.fillStyle = "#222"; ctx.fillText(typeof v==="number"?fmt(v):v, COL_R, y); ctx.textAlign = "left"; y += 17; }
  function tRow(l, v) { ctx.beginPath(); ctx.moveTo(LM, y-4); ctx.lineTo(COL_R, y-4); ctx.stroke(); ctx.fillStyle = "#111"; ctx.font = "bold 11px Helvetica, Arial, sans-serif"; ctx.fillText(l, LM+10, y+8); ctx.textAlign = "right"; ctx.fillText(fmt(v), COL_R, y+8); ctx.textAlign = "left"; y += 22; }
  secH("COMMISSIONS"); row("Seller Broker Fee ("+inputs.sellerBrokerFee+"%)", calc.sellerCommission, 10);
  const bbl = inputs.buyerBrokerPaidBy==="seller"?"Seller pays":inputs.buyerBrokerPaidBy==="split"?"Split 50/50":"Buyer pays";
  row("Buyer Broker Fee ("+inputs.buyerBrokerFee+"% - "+bbl+")", calc.buyerCommSellerPays, 10); tRow("Total Commissions", calc.totalCommission);
  secH("TITLE FEES"); row("Owner's Title Policy"+(inputs.reissueRate?" (Reissue)":""), calc.titlePremium, 10); row("Title Search Fee", calc.searchFee, 10);
  row("Closing Fee", calc.closingFee, 10); row("Lien Search", calc.lienSearch, 10); row("Estoppel Fee", calc.estoppelFee, 10); tRow("Total Title Fees", calc.totalTitleFees);
  secH("OTHER FEES"); row("Documentary Stamp Tax (Deed)", calc.docStampAmount, 10); row("Recording Fee", calc.recordingFee, 10);
  if (calc.misc > 0) row("Misc.", calc.misc, 10); if (calc.concessionDollar > 0) row("Seller Concession", calc.concessionDollar, 10);
  tRow("Total Other Fees", calc.totalOtherFees + calc.concessionDollar + calc.misc);
  secH("DEBITS"); row("Property Tax Proration (~4 mo)", calc.proratedTaxDebit, 10); if (calc.loanBalance > 0) row("Mortgage Payoff", calc.loanBalance, 10); y += 5;
  ctx.fillStyle = "#f0fdf4"; ctx.fillRect(LM-5, y-3, COL_R-LM+10, 45); ctx.strokeStyle = "#22c55e"; ctx.lineWidth = 1; ctx.strokeRect(LM-5, y-3, COL_R-LM+10, 45);
  ctx.fillStyle = "#111"; ctx.font = "bold 12px Helvetica, Arial, sans-serif"; ctx.fillText("Total Closing Costs", LM+5, y+15); ctx.textAlign = "right"; ctx.fillText(fmt(calc.totalClosingCosts), COL_R-5, y+15); ctx.textAlign = "left";
  ctx.fillStyle = calc.netAtClose >= 0 ? "#15803d" : "#dc2626"; ctx.font = "bold 16px Helvetica, Arial, sans-serif"; ctx.fillText("NET AT CLOSE", LM+5, y+36); ctx.textAlign = "right"; ctx.fillText(fmt(calc.netAtClose), COL_R-5, y+36); ctx.textAlign = "left";
  ctx.fillStyle = "#aaa"; ctx.font = "9px Helvetica, Arial, sans-serif"; ctx.textAlign = "center";
  ctx.fillText("This is an estimate only. Actual figures may vary. Brevard County, FL rates applied.", W/2, H-30);
  ctx.fillText("Generated " + new Date().toLocaleString(), W/2, H-18);
  const imgData = canvas.toDataURL("image/png", 1.0);
  const pw = window.open("", "_blank");
  if (pw) { pw.document.write('<!DOCTYPE html><html><head><title>Seller Net Sheet</title><style>@page{size:letter;margin:0}body{margin:0;padding:0;display:flex;justify-content:center}img{width:100%;max-width:612px;height:auto}@media print{body{margin:0}img{width:100%;page-break-after:avoid}}</style></head><body><img src="'+imgData+'"/><script>window.onload=function(){setTimeout(function(){window.print()},300)};<\/script></body></html>'); pw.document.close(); }
}

function DonutChart({ data, size = 200 }) {
  const total = data.reduce((s, d) => s + Math.abs(d.value), 0);
  if (total === 0) return null;
  const cx = size/2, cy = size/2, r = size*0.38, sw = size*0.18;
  let cum = 0;
  return (
    <svg width={size} height={size} viewBox={"0 0 "+size+" "+size}>
      {data.filter(d => d.value > 0).map((d, i) => {
        const pct = d.value/total, da = 2*Math.PI*r, doff = da*(1-pct), rot = cum*360-90; cum += pct;
        return <circle key={i} cx={cx} cy={cy} r={r} fill="none" stroke={d.color} strokeWidth={sw} strokeDasharray={da} strokeDashoffset={doff} transform={"rotate("+rot+" "+cx+" "+cy+")"} style={{transition:"all 0.5s ease"}} />;
      })}
      <circle cx={cx} cy={cy} r={r-sw/2+1} fill="white" />
    </svg>
  );
}

function App() {
  const [loanType, setLoanType] = useState("conventional");
  const [salesPrice, setSalesPrice] = useState(0);
  const [sellerBrokerFee, setSellerBrokerFee] = useState(3);
  const [buyerBrokerFee, setBuyerBrokerFee] = useState(3);
  const [buyerBrokerPaidBy, setBuyerBrokerPaidBy] = useState("seller");
  const [sellerConcession, setSellerConcession] = useState(0);
  const [sellerConcessionIsPct, setSellerConcessionIsPct] = useState(true);
  const [misc, setMisc] = useState(0);
  const [reTax, setReTax] = useState(1);
  const [reTaxIsPct, setReTaxIsPct] = useState(true);
  const [loanBalance, setLoanBalance] = useState(0);
  const [reissueRate, setReissueRate] = useState(false);
  const [showDetail, setShowDetail] = useState(false);
  const [computed, setComputed] = useState(false);

  const calc = useMemo(() => {
    if (salesPrice <= 0) return null;
    const sc = salesPrice * (sellerBrokerFee / 100);
    const bc = salesPrice * (buyerBrokerFee / 100);
    const bcs = buyerBrokerPaidBy === "seller" ? bc : buyerBrokerPaidBy === "split" ? bc / 2 : 0;
    const tc = sc + bcs;
    let tp = calcOwnerTitle(salesPrice); if (reissueRate) tp *= 0.70;
    const sf = calcSearchFee(salesPrice);
    const { closingFee, lienSearch, estoppelFee } = SELLER_CC.titleFees;
    const ttf = tp + sf + closingFee + lienSearch + estoppelFee;
    const ds = Math.ceil(salesPrice / 100) * FL_DOC_STAMP_DEED;
    const rf = SELLER_CC.otherFees.recordingFee;
    const tof = ds + rf;
    const at = reTaxIsPct ? salesPrice * (reTax / 100) : reTax;
    const ptd = at / 12 * 4;
    const cd = sellerConcessionIsPct ? salesPrice * (sellerConcession / 100) : sellerConcession;
    const tcc = ttf + tof + tc + cd + misc;
    const nac = salesPrice - loanBalance - ptd - tcc;
    return { sellerCommission: sc, buyerCommSellerPays: bcs, totalCommission: tc, titlePremium: tp, searchFee: sf, closingFee, lienSearch, estoppelFee, totalTitleFees: ttf, docStampAmount: ds, recordingFee: rf, totalOtherFees: tof, annualTax: at, proratedTaxDebit: ptd, concessionDollar: cd, misc, totalClosingCosts: tcc, netAtClose: nac, loanBalance };
  }, [salesPrice, sellerBrokerFee, buyerBrokerFee, buyerBrokerPaidBy, sellerConcession, sellerConcessionIsPct, misc, reTax, reTaxIsPct, loanBalance, reissueRate]);

  const handlePDF = useCallback(() => { if (calc) generatePDF(salesPrice, loanType, calc, { sellerBrokerFee, buyerBrokerFee, buyerBrokerPaidBy, reissueRate }); }, [calc, salesPrice, loanType, sellerBrokerFee, buyerBrokerFee, buyerBrokerPaidBy, reissueRate]);
  const COLORS = ["#FDB415", "#80c342", "#5E81C1", "#d00000", "#BF6A00", "#53f400"];

  return (
    <div style={{minHeight:"100vh",background:"linear-gradient(to bottom,#fff7ed,#fff)"}}>
      <div style={{height:6,background:"linear-gradient(to right,#f87171,#fdba74)"}}></div>
      <header className="bg-white shadow-sm px-6 py-3 flex items-center justify-between" style={{position:"sticky",top:0,zIndex:10}}>
        <div className="flex items-center gap-3">
          <div style={{width:40,height:40,borderRadius:"50%",background:"linear-gradient(135deg,#22c55e,#15803d)",display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontWeight:"bold",fontSize:18}}>S</div>
          <div><span className="text-xl font-bold text-gray-800">Seller Net Sheet</span><span className="ml-2 text-xs font-bold text-green-600 bg-green-50 px-2 py-1 rounded">PRO</span></div>
        </div>
        <span className="text-sm text-gray-400">Brevard County, FL</span>
      </header>
      <div className="max-w-5xl mx-auto px-4 py-6" style={{display:"flex",flexWrap:"wrap",gap:24}}>
        <div style={{width:384,flexShrink:0}}>
          <div className="bg-white rounded-2xl shadow-lg p-6">
            <h2 className="text-2xl font-bold text-gray-800 mb-6">Seller Net Sheet</h2>
            <div className="mb-4"><label className="block text-sm font-medium text-gray-600 mb-1">Loan Type</label>
              <select className="w-full border border-gray-300 rounded-lg px-3 py-2 text-gray-800" value={loanType} onChange={(e) => { setLoanType(e.target.value); setComputed(false); }}>
                {LOAN_TYPES.map(lt => <option key={lt.value} value={lt.value}>{lt.label}</option>)}
              </select></div>
            <CurrencyInput label="Sales Price" value={salesPrice} onChange={(v) => { setSalesPrice(v); setComputed(false); }} placeholder="Required" />
            <div className="mb-4"><label className="block text-sm font-medium text-gray-600 mb-1">Seller Broker Fee</label>
              <div className="flex items-center border border-gray-300 rounded-lg overflow-hidden focus-within-ring">
                <span className="px-3 py-2 bg-blue-50 text-blue-600 font-semibold text-sm border-r border-gray-300">%</span>
                <input type="text" className="flex-1 px-3 py-2 outline-none text-gray-800" value={sellerBrokerFee} onChange={(e) => { setSellerBrokerFee(parseFloat(e.target.value.replace(/[^0-9.]/g,"")) || 0); setComputed(false); }} />
              </div></div>
            <div className="mb-4"><label className="block text-sm font-medium text-gray-600 mb-1">Buyer Broker Fee</label>
              <div className="flex items-center gap-2">
                <div className="flex-1 flex items-center border border-gray-300 rounded-lg overflow-hidden focus-within-ring">
                  <span className="px-3 py-2 bg-blue-50 text-blue-600 font-semibold text-sm border-r border-gray-300">%</span>
                  <input type="text" className="flex-1 px-3 py-2 outline-none text-gray-800" value={buyerBrokerFee} onChange={(e) => { setBuyerBrokerFee(parseFloat(e.target.value.replace(/[^0-9.]/g,"")) || 0); setComputed(false); }} />
                </div>
                <select className="border border-gray-300 rounded-lg px-3 py-2 text-gray-700 text-sm" value={buyerBrokerPaidBy} onChange={(e) => { setBuyerBrokerPaidBy(e.target.value); setComputed(false); }}>
                  {PAID_BY.map(o => <option key={o.value} value={o.value}>{o.label}</option>)}
                </select>
              </div></div>
            <PctOrDollarInput label="Seller Concession" value={sellerConcession} isPct={sellerConcessionIsPct} onValueChange={(v) => { setSellerConcession(v); setComputed(false); }} onModeChange={(p) => setSellerConcessionIsPct(p)} />
            <CurrencyInput label="Misc." value={misc} onChange={(v) => { setMisc(v); setComputed(false); }} />
            <PctOrDollarInput label="RE Tax" value={reTax} isPct={reTaxIsPct} onValueChange={(v) => { setReTax(v); setComputed(false); }} onModeChange={(p) => setReTaxIsPct(p)} />
            <CurrencyInput label="Seller Loan Balance" value={loanBalance} onChange={(v) => { setLoanBalance(v); setComputed(false); }} />
            <div className="mb-4 flex items-center justify-between">
              <label className="text-sm font-medium text-gray-600">Reissue Rate</label>
              <button onClick={() => { setReissueRate(!reissueRate); setComputed(false); }}
                style={{position:"relative",width:48,height:24,borderRadius:12,background:reissueRate?"#3b82f6":"#d1d5db",border:"none",cursor:"pointer"}}>
                <span style={{position:"absolute",top:2,width:20,height:20,borderRadius:10,background:"#fff",boxShadow:"0 1px 3px rgba(0,0,0,.3)",transition:"transform .2s",transform:reissueRate?"translateX(24px)":"translateX(2px)"}}></span>
              </button>
            </div>
            <button onClick={() => setComputed(true)} disabled={salesPrice <= 0}
              style={{width:"100%",marginTop:16,padding:"12px 0",borderRadius:12,fontWeight:"bold",color:"#fff",fontSize:18,border:"none",cursor:salesPrice>0?"pointer":"not-allowed",opacity:salesPrice>0?1:0.4,background:"linear-gradient(to right,#22c55e,#16a34a)"}}>
              COMPUTE
            </button>
          </div>
        </div>
        <div style={{flex:1,minWidth:0}}>
          {(!computed || !calc) ? (
            <div className="flex items-center justify-center bg-white rounded-2xl shadow-lg" style={{height:256}}>
              <p className="text-gray-400 text-lg">Enter a sales price and hit <span className="font-bold text-green-500">COMPUTE</span></p>
            </div>
          ) : (
            <div>
              <div className="bg-white rounded-2xl shadow-lg p-6 mb-6">
                <div className="flex items-center justify-between mb-1">
                  <h3 className="text-lg font-bold text-gray-700">Net at Close</h3>
                  <button onClick={handlePDF} className="flex items-center gap-2 px-4 py-2 rounded-lg text-red-600 font-semibold text-sm border border-red-200" style={{background:"#fef2f2"}}>Download PDF</button>
                </div>
                <p className="text-4xl font-bold mb-6" style={{color:calc.netAtClose>=0?"#16a34a":"#ef4444"}}>{fmt(calc.netAtClose)}</p>
                <div className="flex items-center gap-6">
                  <DonutChart data={[{value:calc.totalCommission,color:COLORS[0]},{value:calc.totalTitleFees,color:COLORS[1]},{value:calc.totalOtherFees,color:COLORS[2]},{value:calc.proratedTaxDebit,color:COLORS[3]},{value:calc.loanBalance,color:COLORS[4]},{value:Math.max(calc.netAtClose,0),color:COLORS[5]}]} size={180} />
                  <div className="flex-1 space-y-2">
                    {[{label:"Sales Price",value:salesPrice},{label:"Loan Payoff",value:-calc.loanBalance,color:COLORS[4]},{label:"Property Tax Debit",value:-calc.proratedTaxDebit,color:COLORS[3]},{label:"Total Closing Costs",value:-calc.totalClosingCosts,color:COLORS[2]}].map((it,i) => (
                      <div key={i} className="flex items-center gap-2 text-sm">
                        {it.color ? <span style={{width:12,height:12,borderRadius:6,background:it.color,display:"inline-block",flexShrink:0}}></span> : <span style={{width:12,height:12,display:"inline-block"}}></span>}
                        <span className="text-gray-600 flex-1">{it.label}</span>
                        <span className="font-semibold" style={{color:it.value<0?"#ef4444":"#1f2937"}}>{fmt(it.value)}</span>
                      </div>
                    ))}
                    <div style={{borderTop:"1px solid #e5e7eb",paddingTop:8}} className="flex items-center gap-2 text-sm">
                      <span style={{width:12,height:12,borderRadius:6,background:COLORS[5],display:"inline-block"}}></span>
                      <span className="text-gray-700 font-bold flex-1">Net at Close</span>
                      <span className="font-bold" style={{color:calc.netAtClose>=0?"#16a34a":"#ef4444"}}>{fmt(calc.netAtClose)}</span>
                    </div>
                  </div>
                </div>
              </div>
              <button onClick={() => setShowDetail(!showDetail)} className="w-full py-3 bg-white rounded-xl shadow text-green-600 font-semibold mb-4" style={{border:"none",cursor:"pointer"}}>{showDetail ? "Hide" : "Show"} Detailed Closing Costs</button>
              {showDetail && (
                <div className="bg-white rounded-2xl shadow-lg p-6">
                  <h3 className="text-xl font-bold text-gray-800 mb-4">Detailed Closing Costs</h3>
                  {[
                    {title:"Commissions",items:[{label:"Seller Broker Fee ("+sellerBrokerFee+"%)",value:calc.sellerCommission},{label:"Buyer Broker Fee ("+buyerBrokerFee+"%)",value:calc.buyerCommSellerPays}]},
                    {title:"Title Fees",items:[{label:"Owner's Title Policy"+(reissueRate?" (Reissue)":""),value:calc.titlePremium},{label:"Title Search Fee",value:calc.searchFee},{label:"Closing Fee",value:calc.closingFee},{label:"Lien Search",value:calc.lienSearch},{label:"Estoppel Fee",value:calc.estoppelFee}]},
                    {title:"Other Fees",items:[{label:"Doc Stamp Tax (Deed)",value:calc.docStampAmount},{label:"Recording Fee",value:calc.recordingFee},...(calc.misc>0?[{label:"Misc.",value:calc.misc}]:[]),...(calc.concessionDollar>0?[{label:"Seller Concession",value:calc.concessionDollar}]:[]) ]},
                    {title:"Debits",items:[{label:"Property Tax Proration (~4 mo)",value:calc.proratedTaxDebit},...(calc.loanBalance>0?[{label:"Mortgage Payoff",value:calc.loanBalance}]:[])]},
                  ].map((sec, si) => (
                    <div key={si} className="mb-5">
                      <h4 className="font-bold text-gray-700 text-sm uppercase tracking-wide mb-2" style={{borderBottom:"1px solid #e5e7eb",paddingBottom:4}}>{sec.title}</h4>
                      {sec.items.map((it, ii) => (
                        <div key={ii} className="flex justify-between py-1 text-sm"><span className="text-gray-600">{it.label}</span><span className="font-medium text-gray-800">{fmt(it.value)}</span></div>
                      ))}
                    </div>
                  ))}
                  <div style={{borderTop:"2px solid #d1d5db",paddingTop:12,marginTop:16}}>
                    <div className="flex justify-between text-sm mb-1"><span className="text-gray-600">Total Closing Costs</span><span className="font-semibold text-gray-800">{fmt(calc.totalClosingCosts)}</span></div>
                    <div className="flex justify-between font-bold text-lg mt-2"><span className="text-gray-700">Net at Close</span><span style={{color:calc.netAtClose>=0?"#16a34a":"#ef4444"}}>{fmt(calc.netAtClose)}</span></div>
                  </div>
                </div>
              )}
            </div>
          )}
        </div>
      </div>
      <footer className="text-center text-xs text-gray-400 py-6">Seller Net Sheet Calculator — Brevard County, FL — Rates are estimates only.</footer>
    </div>
  );
}

ReactDOM.render(<App />, document.getElementById("root"));
</script>
</body>
</html>
