    <text x="485" y="229" text-anchor="middle" fill="#f5f5f5" font-size="10.5" font-weight="600">GAINESVILLE</text>

    <!-- Tallahassee -->
    <circle cx="345" cy="100" r="6" fill="#EFBF04"/>
    <circle cx="345" cy="100" r="2.5" fill="#0a0a0a"/>
    <text x="345" y="124" text-anchor="middle" fill="#f5f5f5" font-size="10.5" font-weight="600">TALLAHASSEE</text>

    <!-- Pensacola -->
    <circle cx="75" cy="95" r="6" fill="#EFBF04"/>
    <circle cx="75" cy="95" r="2.5" fill="#0a0a0a"/>
    <text x="75" y="119" text-anchor="middle" fill="#f5f5f5" font-size="10.5" font-weight="600">PENSACOLA</text>

    <!-- Destin -->
    <circle cx="154" cy="99" r="3" fill="#EFBF04" opacity="0.85"/>
    <text x="154" y="123" text-anchor="middle" fill="#9ca3af" font-size="9">Destin</text>

    <!-- Panama City Beach -->
    <circle cx="211" cy="118" r="3" fill="#EFBF04" opacity="0.85"/>
    <text x="211" y="142" text-anchor="middle" fill="#9ca3af" font-size="9">PC Beach</text>

