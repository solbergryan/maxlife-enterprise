    <rect x="0" y="0" width="260" height="248" rx="8" fill="#0f1824" stroke="#1e2d3d" stroke-width="1"/>
    <rect x="0" y="0" width="260" height="36" rx="8" fill="#EFBF04" opacity="0.08"/>
