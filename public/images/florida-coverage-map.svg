    <text x="751" y="481" text-anchor="end" fill="#9ca3af" font-size="9">Boca Raton</text>

    <!-- Jupiter -->
    <circle cx="762" cy="432" r="3" fill="#EFBF04" opacity="0.85"/>
    <text x="752" y="435" text-anchor="end" fill="#9ca3af" font-size="9">Jupiter</text>

    <!-- Naples -->
    <circle cx="591" cy="500" r="5" fill="#EFBF04"/>
    <text x="581" y="503" text-anchor="end" fill="#f5f5f5" font-size="10.5" font-weight="600">NAPLES</text>

    <!-- Fort Myers -->
    <circle cx="575" cy="478" r="5" fill="#EFBF04"/>
    <text x="565" y="481" text-anchor="end" fill="#f5f5f5" font-size="10.5" font-weight="600">Ft. Myers</text>

    <!-- Cape Coral (smaller) -->
    <circle cx="566" cy="488" r="2.5" fill="#EFBF04" opacity="0.85"/>

    <!-- Marco Island -->
    <circle cx="597" cy="519" r="2.5" fill="#EFBF04" opacity="0.85"/>
    <text x="607" y="523" fill="#9ca3af" font-size="9">Marco Is.</text>

    <!-- Bonita Springs -->
    <circle cx="585" cy="490" r="2.5" fill="#EFBF04" opacity="0.85"/>

    <!-- Sarasota -->
    <circle cx="517" cy="389" r="5" fill="#EFBF04"/>
    <text x="507" y="392" text-anchor="end" fill="#f5f5f5" font-size="10.5" font-weight="600">SARASOTA</text>

    <!-- Bradenton (smaller) -->
    <circle cx="507" cy="378" r="2.5" fill="#EFBF04" opacity="0.85"/>
    <text x="497" y="376" text-anchor="end" fill="#9ca3af" font-size="9">Bradenton</text>

    <!-- Lakewood Ranch -->
    <circle cx="522" cy="380" r="2" fill="#EFBF04" opacity="0.7"/>

    <!-- Venice -->
    <circle cx="527" cy="410" r="2.5" fill="#EFBF04" opacity="0.85"/>
    <text x="537" y="414" fill="#9ca3af" font-size="9">Venice</text>

    <!-- St. Petersburg / Clearwater -->
    <circle cx="504" cy="349" r="3" fill="#EFBF04" opacity="0.85"/>
    <text x="494" y="352" text-anchor="end" fill="#9ca3af" font-size="9">St. Pete</text>

    <circle cx="496" cy="330" r="2.5" fill="#EFBF04" opacity="0.85"/>
    <text x="486" y="328" text-anchor="end" fill="#9ca3af" font-size="9">Clearwater</text>

