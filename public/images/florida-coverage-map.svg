  <!-- Title block (top-left) -->
  <g font-family="Inter, system-ui, -apple-system, sans-serif">
    <rect x="0" y="0" width="340" height="90" fill="#0a0a0a" opacity="0.4"/>
    <text x="32" y="38" fill="#EFBF04" font-size="20" font-weight="800" letter-spacing="2">MAXLIFE REALTY</text>
    <text x="32" y="60" fill="#f5f5f5" font-size="13" font-weight="500">Florida Commercial Real Estate</text>
    <text x="32" y="78" fill="#9ca3af" font-size="10.5" letter-spacing="0.5">Statewide coverage · Headquartered in Orlando</text>
  </g>

  <!-- Legend (bottom-left card) -->
