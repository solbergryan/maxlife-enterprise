<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 230" role="img" aria-label="Max Life Realty">
  <rect width="500" height="230" fill="#0a1a3a"/>

  <!-- Border "MAX LIFE REALTY" seal text -->
  <g font-family="Arial, Helvetica, sans-serif" font-weight="bold" font-size="14" fill="#ffffff" text-anchor="middle" letter-spacing="0.5">
    <!-- Top edge: two repeats -->
    <text x="135" y="20">MAX LIFE REALTY</text>
    <text x="365" y="20">MAX LIFE REALTY</text>
    <!-- Bottom edge: two repeats -->
    <text x="135" y="222">MAX LIFE REALTY</text>
    <text x="365" y="222">MAX LIFE REALTY</text>
    <!-- Left edge (rotated) -->
    <g transform="translate(20, 115) rotate(-90)">
      <text x="0" y="5">MAX LIFE REALTY</text>
    </g>
    <!-- Right edge (rotated) -->
    <g transform="translate(480, 115) rotate(90)">
      <text x="0" y="5">MAX LIFE REALTY</text>
    </g>
  </g>

  <!-- Inner border frame -->
  <rect x="32" y="32" width="436" height="166" fill="none" stroke="#ffffff" stroke-width="3"/>

  <!-- MLR main mark -->
  <g font-family="Arial, Helvetica, sans-serif" font-weight="900" fill="#ffffff">
    <text x="250" y="160" font-size="140" text-anchor="middle" letter-spacing="4">MLR</text>
    <text x="438" y="108" font-size="34" text-anchor="middle">TM</text>
  </g>
</svg>
